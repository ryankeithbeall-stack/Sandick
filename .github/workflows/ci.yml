name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Tests run fully offline — the hyperliquid SDK is faked in conftest.
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check sandick tests
      - name: Run tests with coverage gate
        run: pytest --cov=sandick --cov-report=term-missing

  contracts:
    name: Solidity/EVM contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run contract tests
        run: npm run test:contracts
      - name: Invariant / fuzz tests (deterministic seeds)
        run: npm run test:invariant
      - name: Contract coverage (gate on total + per-file line coverage)
        env:
          COVERAGE_MIN: "85"
          COVERAGE_MIN_PER_FILE: "80"
        run: npm run coverage:contracts
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: coverage/contracts/
          if-no-files-found: ignore

  static-analysis:
    name: Static analysis (Slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci   # OpenZeppelin sources for the @openzeppelin remap
      - name: Solidity lint (solhint, informational)
        run: npm run lint:sol
        continue-on-error: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Slither + solc
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer solc-select
          solc-select install 0.8.26
          solc-select use 0.8.26
      - name: Run Slither (informational)
        run: bash scripts/static_analysis.sh slither-report.txt
      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.txt
          if-no-files-found: ignore

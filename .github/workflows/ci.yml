name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Tests run fully offline — the hyperliquid SDK is faked in conftest.
          pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: pytest --cov=sandick --cov-report=term-missing

  contracts:
    name: Solidity/EVM contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run contract tests
        run: npm run test:contracts
      - name: Contract coverage (gate on total line coverage)
        env:
          COVERAGE_MIN: "65"
        run: npm run coverage:contracts
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: coverage/contracts/
          if-no-files-found: ignore
